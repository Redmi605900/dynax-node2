<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8"><title>DYNAX Wallet</title>
<style>
body{background:#0a0a0a;color:#f0c040;font-family:Arial,sans-serif;max-width:800px;margin:0 auto;padding:20px}
h1{color:#f0c040;border-bottom:2px solid #f0c040;padding-bottom:10px}
.back{display:inline-block;margin-bottom:20px;color:#f0c040;text-decoration:none;border:1px solid #f0c040;padding:8px 16px;border-radius:4px}
.box{background:#1a1a1a;border:1px solid #f0c040;border-radius:8px;padding:20px;margin:20px 0}
input{background:#0a0a0a;color:#f0c040;border:1px solid #f0c040;padding:8px;width:100%;margin:8px 0;border-radius:4px;box-sizing:border-box}
button{background:#f0c040;color:#000;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-weight:bold;margin:4px}
#result{margin-top:10px;padding:10px;background:#111;border-radius:4px;word-break:break-all}
</style></head>
<body>
<a href="/" class="back">← กลับหน้าหลัก</a>
<h1>💰 DYNAX Wallet</h1>
<div class="box">
<h2>ตรวจสอบยอดเงิน</h2>
<input type="text" id="addr" placeholder="ใส่ address เช่น DXabc123...">
<button onclick="checkBalance()">ตรวจสอบ</button>
<div id="result"></div>
</div>
<script>
const NODE = "https://dynax-node2.onrender.com";
async function checkBalance(){
  const addr = document.getElementById("addr").value.trim();
  if(!addr){alert("กรุณาใส่ address");return;}
  document.getElementById("result").innerText = "กำลังโหลด...";
  try{
    const r = await fetch(`${NODE}/balance/${addr}`);
    const d = await r.json();
    document.getElementById("result").innerText = `ยอดเงิน: ${d.balance} DYX`;
  }catch(e){document.getElementById("result").innerText = "เกิดข้อผิดพลาด: "+e;}
}
</script>
</body></html>
